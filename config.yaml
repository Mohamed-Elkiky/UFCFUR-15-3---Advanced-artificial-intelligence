task2_3_4_cv_quality:
  data_root: task2_3_4_cv_quality/data/raw/Fruit And Vegetable Diseases Dataset
  train_dir: task2_3_4_cv_quality/data/raw/Fruit And Vegetable Diseases Dataset
  test_dir: task2_3_4_cv_quality/data/raw/Fruit And Vegetable Diseases Dataset
  image_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  val_split: 0.2
  batch_size: 32
  num_workers: 0
  random_seed: 42
  imbalance_threshold: 0.7

# Training defaults
  model_type: resnet50
  epochs: 20
  learning_rate: 0.001
  weight_decay: 0.0001
  dropout: 0.5
  step_size: 10
  gamma: 0.5
 
  # Augmentation flags
  augmentation:
    horizontal_flip: true
    vertical_flip: false
    rotation_degrees: 15
    color_jitter: true
    random_crop: false


grading_thresholds:
  # Grade A: awarded only when all three scores meet or exceed these values.
  grade_a:
    color: 75
    size: 80
    ripeness: 70
  # Grade B: fallback when any score drops below a Grade A threshold but all
  # three still meet or exceed these lower values. Otherwise the produce
  # is assigned Grade C.
  grade_b:
    color: 65
    size: 70
    ripeness: 60


# Task 1 Purchase Prediction hyperparameters
task1_purchase_prediction:
  hyperparameters:
    random_forest:
      n_estimators: 200
      max_depth: 12
      min_samples_split: 4
      min_samples_leaf: 2
      random_state: 42
      class_weight: balanced
    xgboost:
      n_estimators: 200
      max_depth: 8
      learning_rate: 0.1
      subsample: 0.8
      colsample_bytree: 0.8
      random_state: 42
    logistic_regression:
      solver: lbfgs
      max_iter: 200
      C: 1.0
      random_state: 42